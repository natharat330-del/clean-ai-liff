<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Watermark Remover</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f4f7f9; text-align: center; }
        header { background: #00b900; color: white; padding: 15px; font-weight: bold; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        #canvas-wrapper { background: #eee; border-radius: 8px; margin-bottom: 15px; line-height: 0; overflow: hidden; border: 2px solid #ccc; position: relative; }
        .controls { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 15px; font-size: 16px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        .btn-select { background: #333; color: white; }
        .btn-run { background: #ff4b4b; color: white; }
        .btn-clear { background: #888; color: white; font-size: 12px; padding: 8px; }
        #status { margin: 15px 0; color: #555; font-size: 14px; min-height: 20px; font-weight: bold; }
        #result-area { display: none; margin-top: 20px; padding-bottom: 40px; }
        #result-area img { width: 100%; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 3px solid #00b900; }
    </style>
</head>
<body>

<header>AI ลบลายน้ำ (LINE Mini App)</header>

<div class="container">
    <div id="canvas-wrapper">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div class="controls">
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <button class="btn-select" onclick="document.getElementById('fileInput').click()">1. เลือกรูปภาพ</button>
        <button class="btn-clear" onclick="clearCanvas()">ล้างรอยระบาย</button>
        <button id="runBtn" class="btn-run" onclick="processAI()" disabled>2. เริ่มลบลายน้ำ</button>
    </div>

    <div id="status">ยินดีต้อนรับ! กรุณาเลือกรูปภาพ</div>

    <div id="result-area">
        <p><strong>✨ ผลลัพธ์จาก AI:</strong></p>
        <img id="outputImage" src="" alt="Result">
        <p style="font-size:12px; color:gray;">(กดค้างที่รูปเพื่อบันทึกลงเครื่อง)</p>
    </div>
</div>

<script>
    let canvas;
    // --- แก้ไข 2 บรรทัดนี้ ---
    const LIFF_ID = "2009596984-AW8MHMx7"; 
    const HF_TOKEN = "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"; 

    // เริ่มต้นระบบ LINE
    async function initLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) liff.login();
        } catch (e) { console.log("LIFF Init Error"); }
    }
    initLiff();

    // ตั้งค่าบอร์ดวาดรูป
    canvas = new fabric.Canvas('mainCanvas', { isDrawingMode: false });
    canvas.freeDrawingBrush.width = 25;
    canvas.freeDrawingBrush.color = 'rgba(255, 0, 0, 0.5)';

    // เมื่อผู้ใช้เลือกรูป
    document.getElementById('fileInput').onchange = function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(f) {
            fabric.Image.fromURL(f.target.result, function(img) {
                const wrapper = document.getElementById('canvas-wrapper');
                const scale = wrapper.offsetWidth / img.width;
                canvas.setDimensions({ width: img.width * scale, height: img.height * scale });
                canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), { scaleX: scale, scaleY: scale });
                canvas.isDrawingMode = true;
                document.getElementById('runBtn').disabled = false;
                document.getElementById('status').innerText = "ใช้นิ้วระบายทับ 'ลายน้ำ' แล้วกดปุ่มแดง";
            });
        };
        reader.readAsDataURL(file);
    };

    function clearCanvas() {
        const bg = canvas.backgroundImage;
        canvas.clear();
        canvas.setBackgroundImage(bg, canvas.renderAll.bind(canvas));
    }

    // ฟังก์ชันส่งรูปไปลบด้วย AI
    async function processAI() {
        const status = document.getElementById('status');
        const runBtn = document.getElementById('runBtn');
        
        status.innerText = "⏳ AI กำลังทำงาน... (ห้ามปิดหน้าจอ)";
        status.style.color = "#ff4b4b";
        runBtn.disabled = true;

        try {
            // 1. ดึงรูปต้นฉบับ
            const originalBase64 = canvas.toDataURL({ format: 'jpeg', quality: 0.8 }).split(',')[1];
            
            // 2. สร้างภาพ Mask (รอยวาดสีขาวบนพื้นดำ)
            const tempCanvas = new fabric.StaticCanvas(null, { width: canvas.width, height: canvas.height });
            tempCanvas.backgroundColor = 'black';
            canvas.getObjects().forEach(obj => {
                const clone = fabric.util.object.clone(obj);
                clone.set('stroke', 'white');
                tempCanvas.add(clone);
            });
            const maskBase64 = tempCanvas.toDataURL({ format: 'png' }).split(',')[1];

            // 3. ยิง API ไปที่ Hugging Face
            const response = await fetch("https://api-inference.huggingface.co/models/runwayml/stable-diffusion-inpainting", {
                headers: { 
                    "Authorization": `Bearer ${HF_TOKEN}`,
                    "Content-Type": "application/json" 
                },
                method: "POST",
                body: JSON.stringify({
                    inputs: originalBase64,
                    mask: maskBase64
                }),
            });

            if (!response.ok) throw new Error("Server AI ไม่ว่าง หรือ Token ผิด");

            const resultBlob = await response.blob();
            const resultUrl = URL.createObjectURL(resultBlob);
            
            document.getElementById('outputImage').src = resultUrl;
            document.getElementById('result-area').style.display = 'block';
            status.innerText = "✅ ลบลายน้ำสำเร็จ!";
            status.style.color = "#00b900";
            
            // เลื่อนหน้าจอลงไปดูผลลัพธ์
            window.scrollTo(0, document.body.scrollHeight);

        } catch (err) {
            status.innerText = "❌ เกิดข้อผิดพลาด: " + err.message;
            status.style.color = "red";
        } finally {
            runBtn.disabled = false;
        }
    }
</script>
</body>
</html>
