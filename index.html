<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Cleaner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f9; text-align: center; }
        header { background: #00b900; color: white; padding: 15px; font-weight: bold; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        #canvas-wrapper { background: #eee; border-radius: 8px; margin-bottom: 15px; border: 2px solid #ccc; overflow: hidden; }
        .controls { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 15px; font-size: 16px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        .btn-select { background: #333; color: white; }
        .btn-run { background: #ff4b4b; color: white; }
        #status { margin: 15px 0; font-size: 14px; font-weight: bold; }
        #result-area { display: none; margin-top: 20px; }
        #result-area img { width: 100%; border-radius: 8px; border: 3px solid #00b900; }
    </style>
</head>
<body>

<header>AI ลบลายน้ำ</header>
<div class="container">
    <div id="canvas-wrapper"><canvas id="mainCanvas"></canvas></div>
    <div class="controls">
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <button class="btn-select" onclick="document.getElementById('fileInput').click()">1. เลือกรูป</button>
        <button id="runBtn" class="btn-run" onclick="processAI()" disabled>2. ลบลายน้ำ</button>
    </div>
    <div id="status">เลือกรูปภาพเพื่อเริ่ม</div>
    <div id="result-area"><img id="outputImage" src=""></div>
</div>

<script>
    let canvas;
    const LIFF_ID = "2009596984-AW8MHMx7"; 
    // ใช้ prompt เพื่อกัน GitHub ตรวจเจอ Token ในโค้ด
    let HF_TOKEN = ""; 

    async function initLiff() {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) liff.login();
    }
    initLiff();

    canvas = new fabric.Canvas('mainCanvas');
    canvas.freeDrawingBrush.width = 25;
    canvas.freeDrawingBrush.color = 'rgba(255, 0, 0, 0.5)';

    document.getElementById('fileInput').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function(f) {
            fabric.Image.fromURL(f.target.result, function(img) {
                const scale = document.getElementById('canvas-wrapper').offsetWidth / img.width;
                canvas.setDimensions({ width: img.width * scale, height: img.height * scale });
                canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), { scaleX: scale, scaleY: scale });
                canvas.isDrawingMode = true;
                document.getElementById('runBtn').disabled = false;
                document.getElementById('status').innerText = "ระบายทับลายน้ำแล้วกดปุ่มแดง";
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    async function processAI() {
        if(!HF_TOKEN) {
            HF_TOKEN = prompt("กรุณาวาง Token (hf_...) ของคุณ:");
            if(!HF_TOKEN) return;
        }

        const status = document.getElementById('status');
        status.innerText = "⏳ กำลังประมวลผล... (ขั้นตอนนี้ใช้เวลา)";
        document.getElementById('runBtn').disabled = true;

        try {
            // แปลง Canvas เป็น Blob (ไฟล์ภาพ) แทน Base64 เพื่อลด Error
            const originalBlob = await new Promise(res => canvas.getElement().toBlob(res, 'image/jpeg', 0.9));
            
            // สร้าง Mask แบบ Blob
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.fillStyle = "black";
            tCtx.fillRect(0,0, canvas.width, canvas.height);
            
            const tempFabric = new fabric.StaticCanvas(null, { width: canvas.width, height: canvas.height });
            canvas.getObjects().forEach(obj => {
                const clone = fabric.util.object.clone(obj);
                clone.set('stroke', 'white');
                tempFabric.add(clone);
            });
            tempFabric.renderAll();
            const maskBlob = await new Promise(res => tempFabric.getElement().toBlob(res, 'image/png'));

            // ใช้ FormData เพื่อส่งไฟล์คู่ (วิธีที่เสถียรที่สุดสำหรับ Inpainting)
            const formData = new FormData();
            formData.append("image", originalBlob);
            formData.append("mask", maskBlob);

            const response = await fetch("https://api-inference.huggingface.co/models/runwayml/stable-diffusion-inpainting", {
                headers: { "Authorization": `Bearer ${HF_TOKEN}` },
                method: "POST",
                body: formData, // ส่งเป็น FormData
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error || "AI ไม่ตอบสนอง");
            }

            const resultBlob = await response.blob();
            document.getElementById('outputImage').src = URL.createObjectURL(resultBlob);
            document.getElementById('result-area').style.display = 'block';
            status.innerText = "✅ สำเร็จ!";
            window.scrollTo(0, document.body.scrollHeight);
        } catch (err) {
            console.error(err);
            status.innerText = "❌ " + err.message;
            // ถ้าขึ้นว่า Model is loading ให้รอ 20 วินาทีแล้วกดใหม่
            if(err.message.includes("loading")) status.innerText = "⏳ AI กำลังตื่น... รอ 20 วินาทีแล้วกดใหม่";
        }
        document.getElementById('runBtn').disabled = false;
    }
</script>
</body>
</html>
