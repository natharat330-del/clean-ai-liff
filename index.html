<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Watermark Remover</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f4f7f9; text-align: center; }
        header { background: #00b900; color: white; padding: 15px; font-weight: bold; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        #canvas-wrapper { background: #eee; border-radius: 8px; margin-bottom: 15px; line-height: 0; overflow: hidden; border: 2px solid #ccc; }
        .controls { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 15px; font-size: 16px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        .btn-select { background: #333; color: white; }
        .btn-run { background: #ff4b4b; color: white; }
        #status { margin: 15px 0; color: #555; font-size: 14px; min-height: 20px; }
        #result-area { display: none; margin-top: 20px; }
        #result-area img { width: 100%; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<header>AI ลบลายน้ำ (LINE Mini App)</header>

<div class="container">
    <div id="canvas-wrapper">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div class="controls">
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <button class="btn-select" onclick="document.getElementById('fileInput').click()">1. เลือกรูปภาพ</button>
        <button id="runBtn" class="btn-run" onclick="processAI()" disabled>2. ลบลายน้ำที่ระบาย</button>
    </div>

    <div id="status">กรุณาเลือกรูปภาพ</div>

    <div id="result-area">
        <p><strong>ผลลัพธ์:</strong> (กดค้างที่รูปเพื่อบันทึก)</p>
        <img id="outputImage" src="">
    </div>
</div>

<script>
    let canvas;
    const LIFF_ID = "2009596984-AW8MHMx7"; 
    const HF_TOKEN = "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"; 

    // เริ่มต้น LINE LIFF
    liff.init({ liffId: LIFF_ID }).then(() => {
        if (!liff.isLoggedIn()) liff.login();
    });

    // ตั้งค่าพื้นฐาน Canvas
    canvas = new fabric.Canvas('mainCanvas', { isDrawingMode: false });
    canvas.freeDrawingBrush.width = 25;
    canvas.freeDrawingBrush.color = 'rgba(255, 0, 0, 0.5)';

    // เมื่อเลือกรูป
    document.getElementById('fileInput').onchange = function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(f) {
            fabric.Image.fromURL(f.target.result, function(img) {
                const maxWidth = document.getElementById('canvas-wrapper').offsetWidth;
                const scale = maxWidth / img.width;
                canvas.setDimensions({ width: img.width * scale, height: img.height * scale });
                canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), { scaleX: scale, scaleY: scale });
                canvas.isDrawingMode = true;
                document.getElementById('runBtn').disabled = false;
                document.getElementById('status').innerText = "ระบายทับลายน้ำแล้วกดปุ่มแดง";
            });
        };
        reader.readAsDataURL(file);
    };

    // ส่งรูปไป AI
    async function processAI() {
        const status = document.getElementById('status');
        const runBtn = document.getElementById('runBtn');
        
        status.innerText = "กำลังประมวลผล... (ประมาณ 15-30 วินาที)";
        runBtn.disabled = true;

        try {
            // 1. เตรียมรูปต้นฉบับ (JPEG)
            const originalBase64 = canvas.toDataURL({ format: 'jpeg', quality: 0.8 }).split(',')[1];
            
            // 2. เตรียม Mask (ส่วนสีแดงที่ระบาย -> แปลงเป็นขาวดำ)
            const maskCanvas = document.createElement('canvas');
            maskCanvas.width = canvas.width;
            maskCanvas.height = canvas.height;
            const mCtx = maskCanvas.getContext('2d');
            mCtx.fillStyle = "black";
            mCtx.fillRect(0,0, canvas.width, canvas.height);
            
            // วาดรอยระบายลงบนพื้นดำให้เป็นสีขาว
            const tempCanvas = new fabric.StaticCanvas(null, { width: canvas.width, height: canvas.height });
            canvas.getObjects().forEach(obj => {
                const clone = fabric.util.object.clone(obj);
                clone.set('stroke', 'white');
                tempCanvas.add(clone);
            });
            const maskBase64 = tempCanvas.toDataURL({ format: 'png' }).split(',')[1];

            // 3. ส่งไป Hugging Face API
            const response = await fetch("https://api-inference.huggingface.co/models/runwayml/stable-diffusion-inpainting", {
                headers: { "Authorization": `Bearer ${HF_TOKEN}`, "Content-Type": "application/json" },
                method: "POST",
                body: JSON.stringify({
                    inputs: originalBase64,
                    mask: maskBase64
                }),
            });

            if (!response.ok) throw new Error("AI ไม่ตอบสนอง ลองอีกครั้งใน 1 นาที");

            const resultBlob = await response.blob();
            document.getElementById('outputImage').src = URL.createObjectURL(resultBlob);
            document.getElementById('result-area').style.display = 'block';
            status.innerText = "ลบสำเร็จ!";
        } catch (err) {
            status.innerText = "ข้อผิดพลาด: " + err.message;
        } finally {
            runBtn.disabled = false;
        }
    }
</script>
</body>
</html>
