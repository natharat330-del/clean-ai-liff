<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Watermark Remover</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; margin: 0; padding: 20px; }
        #canvas-container { margin: 20px auto; border: 2px dashed #ccc; background: white; line-height: 0; }
        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        button { padding: 12px 24px; font-size: 16px; border-radius: 8px; border: none; cursor: pointer; }
        .btn-upload { background: #00b900; color: white; }
        .btn-process { background: #ff4b4b; color: white; }
        #loading { display: none; color: #666; }
        img { max-width: 100%; margin-top: 20px; border-radius: 8px; }
    </style>
</head>
<body>

    <h2>ลบลายน้ำ AI ฟรี</h2>
    
    <div class="controls">
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <button class="btn-upload" onclick="document.getElementById('fileInput').click()">1. เลือกรูปภาพ</button>
        <p style="font-size: 12px; color: #666;">*ระบายทับส่วนที่ต้องการลบ*</p>
    </div>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <button class="btn-process" onclick="processImage()">2. เริ่มลบลายน้ำ</button>
        <div id="loading">กำลังประมวลผล... (อาจใช้เวลา 10-30 วินาที)</div>
    </div>

    <div id="result-container">
        <h3>ผลลัพธ์:</h3>
        <img id="resultImage" alt="รูปที่ลบแล้วจะโชว์ที่นี่">
    </div>

    <script>
        let canvas = new fabric.Canvas('canvas', { isDrawingMode: true });
        canvas.freeDrawingBrush.width = 20;
        canvas.freeDrawingBrush.color = 'rgba(255,0,0,0.5)'; // สีแดงโปร่งแสงให้มองเห็นตอนระบาย

        // 1. เชื่อมต่อ LINE LIFF
        liff.init({ liffId: "ใส่_LIFF_ID_ของคุณ" }).then(() => {
            if (!liff.isLoggedIn()) liff.login();
        });

        // 2. จัดการการอัปโหลดรูป
        document.getElementById('fileInput').onchange = function(e) {
            let reader = new FileReader();
            reader.onload = function(event) {
                fabric.Image.fromURL(event.target.result, function(img) {
                    // ปรับขนาด Canvas ให้พอดีกับรูป
                    const maxWidth = window.innerWidth - 40;
                    const scale = maxWidth / img.width;
                    img.set({ scaleX: scale, scaleY: scale });
                    canvas.setWidth(img.width * scale);
                    canvas.setHeight(img.height * scale);
                    canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
                });
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // 3. ส่งไปให้ AI (Hugging Face)
        async function processImage() {
            const loading = document.getElementById('loading');
            loading.style.display = 'block';

            // สร้าง Mask (ส่วนที่ระบายเป็นสีขาว พื้นหลังสีดำ)
            canvas.backgroundImage = null;
            canvas.getObjects().forEach(obj => obj.set('color', 'white'));
            canvas.backgroundColor = 'black';
            const maskBase64 = canvas.toDataURL();

            // กลับมาโชว์รูปเดิมบนหน้าจอ (เพื่อให้ผู้ใช้ไม่ตกใจ)
            // หมายเหตุ: ในขั้นตอนนี้ต้องส่งทั้งรูปจริงและ Mask ไปที่ API
            // เนื่องจาก API ฟรีของ Hugging Face มีความซับซ้อนในการส่งไฟล์คู่ 
            // แนะนำให้ใช้โมเดล 'Inpainting' ที่รับค่าผ่าน HTTP POST
            
            alert("ระบบกำลังเชื่อมต่อ AI... ขั้นตอนนี้ต้องใช้ API Token ของคุณ");
            
            // ตัวอย่าง Fetch ไปที่ Hugging Face (ต้องใส่ Token และ URL โมเดลจริง)
            /*
            const response = await fetch("https://api-inference.huggingface.co/models/runwayml/stable-diffusion-inpainting", {
                headers: { Authorization: "Bearer ใส่_TOKEN_ของคุณ" },
                method: "POST",
                body: JSON.stringify({ inputs: originalImageBase64, mask: maskBase64 })
            });
            */
            
            loading.style.display = 'none';
        }
    </script>
</body>
</html>
