<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Remover</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; background: #f0f2f5; }
        #canvas-box { background: #fff; border: 2px solid #ddd; margin-bottom: 15px; line-height: 0; }
        button { width: 100%; padding: 15px; margin: 5px 0; border-radius: 10px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-upload { background: #00b900; color: #fff; }
        .btn-run { background: #ff4b4b; color: #fff; }
        #status { color: #555; margin: 10px; font-size: 14px; }
        img { width: 100%; margin-top: 20px; border-radius: 10px; display: none; }
    </style>
</head>
<body>
    <h3>AI ลบลายน้ำ</h3>
    <div id="canvas-box"><canvas id="c"></canvas></div>
    <input type="file" id="f" accept="image/*" style="display:none">
    <button class="btn-upload" onclick="document.getElementById('f').click()">1. เลือกรูป</button>
    <button id="go" class="btn-run" onclick="run()" disabled>2. ลบลายน้ำ</button>
    <div id="status">รอเลือกรูป...</div>
    <img id="res">

<script>
    let canvas = new fabric.Canvas('c');
    let HF_TOKEN = "";
    const LIFF_ID = "2009596984-AW8MHMx7"; 

    liff.init({ liffId: LIFF_ID }).then(() => { if(!liff.isLoggedIn()) liff.login(); });

    document.getElementById('f').onchange = function(e) {
        let r = new FileReader();
        r.onload = function(ex) {
            fabric.Image.fromURL(ex.target.result, function(img) {
                let s = (window.innerWidth - 40) / img.width;
                canvas.setDimensions({ width: img.width * s, height: img.height * s });
                canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), { scaleX: s, scaleY: s });
                canvas.isDrawingMode = true;
                canvas.freeDrawingBrush.width = 30;
                canvas.freeDrawingBrush.color = 'rgba(255,0,0,0.5)';
                document.getElementById('go').disabled = false;
                document.getElementById('status').innerText = "ระบายทับรอยแล้วกดปุ่มแดง";
            });
        };
        r.readAsDataURL(e.target.files[0]);
    };

    async function run() {
        if(!HF_TOKEN) HF_TOKEN = prompt("วาง Token hf_... ของคุณ:");
        if(!HF_TOKEN) return;

        let st = document.getElementById('status');
        st.innerText = "⏳ กำลังประมวลผล... (อาจรอ 30 วินาที)";
        
        try {
            // สร้างรูปต้นฉบับ Blob
            const imgBlob = await new Promise(res => canvas.getElement().toBlob(res, 'image/jpeg'));
            
            // ส่งไป Hugging Face แบบ Binary
            const resp = await fetch("https://api-inference.huggingface.co/models/ghoskno/Coloring_Inpaint", {
                headers: { "Authorization": "Bearer " + HF_TOKEN },
                method: "POST",
                body: imgBlob
            });

            if(!resp.ok) throw new Error("AI ติดคิว หรือ Token ผิด ลองกดใหม่");

            const out = await resp.blob();
            document.getElementById('res').src = URL.createObjectURL(out);
            document.getElementById('res').style.display = 'block';
            st.innerText = "✅ เสร็จแล้ว!";
        } catch (e) {
            st.innerText = "❌ Error: " + e.message;
        }
    }
</script>
</body>
</html>
