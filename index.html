<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Eraser</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 10px; margin: 0; }
        #canvas-container { background: white; border: 2px solid #ccc; margin: 10px auto; line-height: 0; display: inline-block; }
        button { width: 90%; padding: 15px; margin: 5px 0; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-upload { background: #333; color: white; }
        .btn-run { background: #ff4b4b; color: white; }
        #status { color: #555; font-size: 13px; margin: 10px; font-weight: bold; }
        #res { width: 90%; margin-top: 15px; border-radius: 12px; display: none; border: 3px solid #00b900; }
    </style>
</head>
<body>
    <h3>AI ลบวัตถุ/ลายน้ำ</h3>
    <div id="canvas-container"><canvas id="c"></canvas></div>
    <input type="file" id="f" accept="image/*" style="display:none">
    
    <button class="btn-upload" onclick="document.getElementById('f').click()">1. เลือกรูปภาพ</button>
    <button id="go" class="btn-run" onclick="run()" disabled>2. เริ่มลบ (AI)</button>
    
    <div id="status">กรุณาเลือกรูปภาพ</div>
    <img id="res">

<script>
    let canvas = new fabric.Canvas('c');
    let HF_TOKEN = "";
    const LIFF_ID = "2009596984-AW8MHMx7"; // <--- ใส่ ID ของคุณ

    liff.init({ liffId: LIFF_ID });

    document.getElementById('f').onchange = function(e) {
        let r = new FileReader();
        r.onload = function(f) {
            fabric.Image.fromURL(f.target.result, function(img) {
                let s = (window.innerWidth - 40) / img.width;
                canvas.setDimensions({ width: img.width * s, height: img.height * s });
                canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), { scaleX: s, scaleY: s });
                canvas.isDrawingMode = true;
                canvas.freeDrawingBrush.width = 30;
                canvas.freeDrawingBrush.color = 'rgba(255, 0, 0, 0.5)';
                document.getElementById('go').disabled = false;
                document.getElementById('status').innerText = "ระบายทับจุดที่จะลบ แล้วกดปุ่มแดง";
            });
        };
        r.readAsDataURL(e.target.files[0]);
    };

    async function run() {
        if(!HF_TOKEN) HF_TOKEN = prompt("วาง Token hf_... อันใหม่ของคุณ:");
        if(!HF_TOKEN) return;

        let st = document.getElementById('status');
        st.innerText = "⏳ กำลังส่งข้อมูล... (ห้ามปิดหน้าจอ)";
        document.getElementById('go').disabled = true;

        try {
            // ส่งแค่รูปภาพอย่างเดียวไปที่โมเดล Image-to-Image 
            // วิธีนี้จะไม่ค่อยติด CORS และพังยากกว่า
            const imgBlob = await new Promise(res => canvas.getElement().toBlob(res, 'image/jpeg', 0.8));

            const response = await fetch("https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-2-inpainting", {
                headers: { "Authorization": `Bearer ${HF_TOKEN}` },
                method: "POST",
                body: imgBlob
            });

            if (!response.ok) {
                const err = await response.json();
                if(err.error && err.error.includes("loading")) throw new Error("AI กำลังโหลด... รอ 20 วินาทีแล้วกดใหม่");
                throw new Error("API มีปัญหา ลองเช็ค Token อีกครั้ง");
            }

            const out = await response.blob();
            document.getElementById('res').src = URL.createObjectURL(out);
            document.getElementById('res').style.display = 'block';
            st.innerText = "✅ ลบเสร็จเรียบร้อย!";
        } catch (e) {
            st.innerText = "❌ " + e.message;
        }
        document.getElementById('go').disabled = false;
    }
</script>
</body>
</html>
