<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Cleaner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f9; text-align: center; }
        header { background: #00b900; color: white; padding: 15px; font-weight: bold; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        #canvas-wrapper { background: #eee; border-radius: 8px; margin-bottom: 15px; border: 2px solid #ccc; overflow: hidden; }
        .controls { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 15px; font-size: 16px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        .btn-select { background: #333; color: white; }
        .btn-run { background: #ff4b4b; color: white; }
        #status { margin: 15px 0; font-size: 14px; font-weight: bold; }
        #result-area { display: none; margin-top: 20px; }
        #result-area img { width: 100%; border-radius: 8px; border: 3px solid #00b900; }
    </style>
</head>
<body>

<header>AI ลบลายน้ำ</header>
<div class="container">
    <div id="canvas-wrapper"><canvas id="mainCanvas"></canvas></div>
    <div class="controls">
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <button class="btn-select" onclick="document.getElementById('fileInput').click()">1. เลือกรูป</button>
        <button id="runBtn" class="btn-run" onclick="processAI()" disabled>2. ลบลายน้ำ</button>
    </div>
    <div id="status">เลือกรูปภาพเพื่อเริ่ม</div>
    <div id="result-area"><img id="outputImage" src=""></div>
</div>

<script>
    let canvas;
    const LIFF_ID = "2009596984-AW8MHMx7"; 
    // ใช้ prompt เพื่อกัน GitHub ตรวจเจอ Token ในโค้ด
    let HF_TOKEN = ""; 

    async function initLiff() {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) liff.login();
    }
    initLiff();

    canvas = new fabric.Canvas('mainCanvas');
    canvas.freeDrawingBrush.width = 25;
    canvas.freeDrawingBrush.color = 'rgba(255, 0, 0, 0.5)';

    document.getElementById('fileInput').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function(f) {
            fabric.Image.fromURL(f.target.result, function(img) {
                const scale = document.getElementById('canvas-wrapper').offsetWidth / img.width;
                canvas.setDimensions({ width: img.width * scale, height: img.height * scale });
                canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), { scaleX: scale, scaleY: scale });
                canvas.isDrawingMode = true;
                document.getElementById('runBtn').disabled = false;
                document.getElementById('status').innerText = "ระบายทับลายน้ำแล้วกดปุ่มแดง";
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    async function processAI() {
        // ถาม Token จากผู้ใช้ถ้ายังไม่มี
        if(!HF_TOKEN) {
            HF_TOKEN = prompt("กรุณาวาง Token (hf_...) ของคุณเพื่อใช้งาน:");
            if(!HF_TOKEN) return;
        }

        const status = document.getElementById('status');
        status.innerText = "⏳ กำลังประมวลผล...";
        document.getElementById('runBtn').disabled = true;

        try {
            const originalBase64 = canvas.toDataURL({ format: 'jpeg', quality: 0.8 }).split(',')[1];
            const tempCanvas = new fabric.StaticCanvas(null, { width: canvas.width, height: canvas.height });
            tempCanvas.backgroundColor = 'black';
            canvas.getObjects().forEach(obj => {
                const clone = fabric.util.object.clone(obj);
                clone.set('stroke', 'white');
                tempCanvas.add(clone);
            });
            const maskBase64 = tempCanvas.toDataURL({ format: 'png' }).split(',')[1];

            const response = await fetch("https://api-inference.huggingface.co/models/runwayml/stable-diffusion-inpainting", {
                headers: { "Authorization": `Bearer ${HF_TOKEN}`, "Content-Type": "application/json" },
                method: "POST",
                body: JSON.stringify({ inputs: originalBase64, mask: maskBase64 }),
            });

            if (!response.ok) throw new Error("Token ผิดหรือ AI ไม่ว่าง");

            const resultBlob = await response.blob();
            document.getElementById('outputImage').src = URL.createObjectURL(resultBlob);
            document.getElementById('result-area').style.display = 'block';
            status.innerText = "✅ สำเร็จ!";
        } catch (err) {
            status.innerText = "❌ " + err.message;
            HF_TOKEN = ""; // ล้าง Token เผื่อใส่ผิด
        }
        document.getElementById('runBtn').disabled = false;
    }
</script>
</body>
</html>
