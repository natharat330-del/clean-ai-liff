<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cleanup (Clipdrop)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f8f9fa; padding: 10px; margin: 0; }
        #container { background: white; border: 2px solid #ddd; margin: 10px auto; line-height: 0; display: inline-block; border-radius: 8px; overflow: hidden; }
        button { width: 90%; padding: 15px; margin: 5px 0; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-upload { background: #000; color: white; }
        .btn-run { background: #007bff; color: white; }
        #status { color: #555; font-size: 14px; margin: 15px; font-weight: bold; }
        #res { width: 90%; margin-top: 15px; border-radius: 12px; display: none; border: 4px solid #28a745; }
    </style>
</head>
<body>
    <h3>AI Cleanup Eraser</h3>
    <div id="container"><canvas id="c"></canvas></div>
    <input type="file" id="f" accept="image/*" style="display:none">
    
    <button class="btn-upload" onclick="document.getElementById('f').click()">1. เลือกรูปภาพ</button>
    <button id="go" class="btn-run" onclick="run()" disabled>2. ลบส่วนที่ระบาย (Clipdrop)</button>
    
    <div id="status">เลือกรูปภาพเพื่อเริ่มใช้งาน</div>
    <img id="res">

<script>
    let canvas = new fabric.Canvas('c');
    let CLIPDROP_API_KEY = ""; 
    const LIFF_ID = "2009596984-AW8MHMx7"; 

    liff.init({ liffId: LIFF_ID });

    document.getElementById('f').onchange = function(e) {
        let r = new FileReader();
        r.onload = function(f) {
            fabric.Image.fromURL(f.target.result, function(img) {
                let s = (window.innerWidth - 40) / img.width;
                canvas.setDimensions({ width: img.width * s, height: img.height * s });
                canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), { scaleX: s, scaleY: s });
                canvas.isDrawingMode = true;
                canvas.freeDrawingBrush.width = 35;
                canvas.freeDrawingBrush.color = 'rgba(255, 0, 0, 0.5)';
                document.getElementById('go').disabled = false;
                document.getElementById('status').innerText = "ระบายสีแดงทับลายน้ำ แล้วกดปุ่มสีฟ้า";
            });
        };
        r.readAsDataURL(e.target.files[0]);
    };

    async function run() {
        if(!CLIPDROP_API_KEY) {
            CLIPDROP_API_KEY = prompt("วาง Clipdrop API Key ของคุณที่นี่:");
            if(!CLIPDROP_API_KEY) return;
        }

        let st = document.getElementById('status');
        st.innerText = "⏳ AI กำลังลบวัตถุ... (ใช้เวลาประมาณ 5-10 วินาที)";
        document.getElementById('go').disabled = true;

        try {
            // 1. เตรียมรูปต้นฉบับ
            const imageBlob = await new Promise(res => canvas.getElement().toBlob(res, 'image/jpeg', 0.9));
            
            // 2. เตรียม Mask (รอยระบายขาวดำ)
            const maskCanvas = document.createElement('canvas');
            maskCanvas.width = canvas.width;
            maskCanvas.height = canvas.height;
            const mCtx = maskCanvas.getContext('2d');
            mCtx.fillStyle = "black";
            mCtx.fillRect(0,0, canvas.width, canvas.height);
            
            const tempFabric = new fabric.StaticCanvas(null, { width: canvas.width, height: canvas.height });
            canvas.getObjects().forEach(obj => {
                let clone = fabric.util.object.clone(obj);
                clone.set('stroke', 'white');
                tempFabric.add(clone);
            });
            tempFabric.renderAll();
            const maskBlob = await new Promise(res => tempFabric.getElement().toBlob(res, 'image/png'));

            // 3. ส่งไป Clipdrop Cleanup API
            const formData = new FormData();
            formData.append('image_file', imageBlob);
            formData.append('mask_file', maskBlob);

            const response = await fetch('https://clipdrop-api.co/cleanup/v1', {
                method: 'POST',
                headers: { 'x-api-key': CLIPDROP_API_KEY },
                body: formData
            });

            if (!response.ok) throw new Error("API Error: ตรวจสอบ Key หรือโควตาของคุณ");

            const resultBlob = await response.blob();
            document.getElementById('res').src = URL.createObjectURL(resultBlob);
            document.getElementById('res').style.display = 'block';
            st.innerText = "✅ เสร็จเรียบร้อย!";
            st.style.color = "#28a745";
        } catch (e) {
            st.innerText = "❌ " + e.message;
            st.style.color = "red";
        }
        document.getElementById('go').disabled = false;
    }
</script>
</body>
</html>
